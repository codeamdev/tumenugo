name: Web CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint · Type-check · Test · Sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Check order-calc in sync with mobile
        run: |
          git clone --depth=1 https://github.com/codeamdev/tumenugoapp.git /tmp/tumenugoapp
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const norm = (s) => s
              .replace(/\/\*[\s\S]*?\*\//g, '')
              .replace(/\/\/[^\n]*/g, '')
              .replace(/\s+/g, ' ')
              .trim();
            const web = norm(fs.readFileSync('src/lib/order-calc.ts', 'utf8'));
            const mob = norm(fs.readFileSync('/tmp/tumenugoapp/src/lib/order-calc.ts', 'utf8'));
            const hw = crypto.createHash('sha256').update(web).digest('hex');
            const hm = crypto.createHash('sha256').update(mob).digest('hex');
            if (hw !== hm) {
              console.error('✗ order-calc.ts OUT OF SYNC');
              console.error('  web hash:    ' + hw.slice(0,16) + '...');
              console.error('  mobile hash: ' + hm.slice(0,16) + '...');
              process.exit(1);
            }
            console.log('✓ order-calc.ts in sync (' + hw.slice(0,16) + '...)');
          "
