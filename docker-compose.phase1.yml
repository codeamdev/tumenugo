# docker-compose.phase1.yml — Fase 1: IP pública, sin dominio
#
# Usa network_mode: host (igual que catalogo) para conectar al PostgreSQL
# del sistema directamente por 127.0.0.1 sin cambios en pg_hba.conf.
#
# Uso:
#   docker compose -f docker-compose.phase1.yml --env-file .env.production build
#   docker compose -f docker-compose.phase1.yml --env-file .env.production --profile migrate run --rm migrate
#   docker compose -f docker-compose.phase1.yml --env-file .env.production up -d

services:

  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_BASE_DOMAIN: ${NEXT_PUBLIC_BASE_DOMAIN}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    image: cafeteria-app:latest
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: "4821"      # Puerto no estándar, distinto al 3000 de catalogo
      HOSTNAME: "0.0.0.0"
    network_mode: host  # Accede a postgres del sistema vía 127.0.0.1 sin cambios en pg_hba.conf
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:4821/api/auth/me',(r)=>r.statusCode<500?process.exit(0):process.exit(1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Migrations (one-shot) ────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    image: cafeteria-migrator:latest
    command: sh -c "npm run db:migrate:public && npm run db:migrate:tenants"
    env_file: .env.production
    network_mode: host
    profiles:
      - migrate
