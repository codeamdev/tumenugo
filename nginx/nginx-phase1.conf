# ══════════════════════════════════════════════════════════════════════════════
# nginx-phase1.conf — Cafeteria SaaS — Fase 1: IP pública, HTTP sin SSL
#
# Archivo a colocar en: /etc/nginx/sites-available/cafeteria
# Activar con: sudo ln -s /etc/nginx/sites-available/cafeteria /etc/nginx/sites-enabled/cafeteria
#
# Cuando tengas dominio: reemplazar por nginx.prod.conf
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name 2.25.145.148;

    client_max_body_size    20m;
    client_body_buffer_size 128k;

    # ── Next.js static: cache inmutable ──────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:4821;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Service Worker ────────────────────────────────────────────────────────
    location = /sw.js {
        proxy_pass http://127.0.0.1:4821;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # ── Assets públicos ───────────────────────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|otf)$ {
        proxy_pass http://127.0.0.1:4821;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── Todo lo demás → Next.js ───────────────────────────────────────────────
    location / {
        proxy_pass              http://127.0.0.1:4821;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection 'upgrade';
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_cache_bypass      $http_upgrade;
        proxy_read_timeout      60s;
        proxy_connect_timeout   60s;
    }
}
